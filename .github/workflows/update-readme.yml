name: Update GitHub Profile README

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update stats
        run: |
          DATE=$(date -u)
          MARKER="<!-- LAST_UPDATED_MARKER -->"

          # Remove all old timestamp markers and add new one
          sed -i '/<!-- Last updated:/d' README.md

          # Ensure marker exists
          if ! grep -q "$MARKER" README.md; then
            echo "" >> README.md
            echo "$MARKER" >> README.md
          fi

          # Replace marker with new timestamp
          sed -i "s|$MARKER|<!-- Last updated: $DATE -->|" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update README [skip ci]"
          git push
